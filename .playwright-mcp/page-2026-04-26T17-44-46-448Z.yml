          - text: A new shop,
          - emphasis [ref=e115]: in Atlanta
        - paragraph [ref=e116]: ATL Blade Co. is new. I'm Zian Bhutta. I started this after moving to Atlanta to find a new home, and the knives came out of trying to put down roots here. Right now it's just me, a small shop, and the people I'm slowly meeting around the city who care about this kind of work.
        - paragraph [ref=e117]: "Most of what I make is Damascus steel: the patterned blades you see on the pocket knives and the skinner. The fixed blades and the karambit are powdercoated for hard outdoor use. Handles are pakkawood, bone, micarta, or resin, depending on what the knife is for."
